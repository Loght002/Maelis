<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Maelis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>

    <div id="tela-inicial">
        <h1>Pressione qualquer tecla para iniciar...</h1>
        <div id="tela-cheia">
            <h1>Para melhor experiência, aperte F11 para maximizar a tela</h1>
        </div>
    </div>

    <div id="menu-principal">
        <a href="#" id="botao-config">
            <i class="fa-solid fa-gear"></i>
        </a>

        <h1 class="titulo-principal" data-text="MAELIS">MAELIS</h1>
        <h2 class="subtitulo">GUARDIÃ DA NÉVOA</h2>

        <div class="botoes-menu">
            <button id="botao-iniciar">INICIAR</button>
            <button id="botao-modo-infinito">MODO INFINITO</button> 
            <button id="botao-creditos">CRÉDITOS</button>
        </div>

        <div class="versao">
            VERSÃO: 1.0
        </div>
    </div>

    <div id="tela-cutscene">
        <h1>Cutscene...</h1>
        <p>(Pressione qualquer tecla para ir ao menu)</p>
    </div>

    <div id="tela-creditos">
        <h1>Créditos</h1>
        <p>Jogo desenvolvido por...</p>
        <p>(Pressione qualquer tecla para voltar ao menu)</p>
    </div>

    <script src="js/menu.js"></script>
</body>
</html>
